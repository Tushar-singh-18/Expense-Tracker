<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="main-form">
        <h1 id="heading"> Expense Tracker</h1>
        <div id="summary">
            <p>Total Expense: <span id="total-exp">0</span></p>
        </div>
        <div id="input-details">
            <input type="text" id="name-input" placeholder="Write name here">
            <br>
            <input type="number" id="amount-input" placeholder="Write amount here">
            <br>
            <!-- <span>category: </span><span id="category-opt"></span> -->
            <select id="category-selection">
                <option disabled selected>Select category</option>
                <option value="Travel">Travel</option>
                <option value="Food">Food</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Groceries">Groceries</option>
                <option value="other">Other</option>
            </select>
            <br>
            <button type="button" id="addBtn">Add Expense</button>
        </div>
        <div id="display-list">
            <ul id="expense-list">

            </ul>

        </div>

    </div>
    <script src="script.js"></script>
</body>

</html>
